# Home Assistant Configuration
# Config files at ~/homelab/ha-config/ via Samba mount
# Git repo: github.com/cconner8704/home-assistant-config
# Secrets: secrets.yaml (gitignored) + Infisical

# Default integrations (frontend, mobile_app, stream, alerts, etc.)
default_config:

# Text-to-speech
tts:
  - platform: google_translate

# Include files
automation: !include automations.yaml
cover: !include covers.yaml
homekit: !include homekit.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
sensor: !include sensors.yaml
group: !include groups.yaml
template: !include templates.yaml

# Input booleans -- radio-button switches for Master Bedroom TV picture mode
input_boolean:
  tv_vivid:
    name: TV Vivid
    icon: mdi:television
  tv_dim:
    name: TV Dim
    icon: mdi:brightness-4
  tv_sleep:
    name: TV Sleep
    icon: mdi:brightness-2

# Custom integration: LG webOS picture settings service
lg_picture:

# Entity customization
homeassistant:
  internal_url: "http://homeassistant.local:8123"
  customize: !include customize_entries.yaml

# Custom frontend cards (HACS)
frontend:
  extra_module_url:
    - /local/community/custom-brand-icons/custom-brand-icons.js

# REST commands — notifications
rest_command:
  imessage:
    url: !secret bluebubbles_url
    method: POST
    content_type: "application/json"
    payload: '{"chatGuid": "any;-;+18594756907", "message": "{{ message }}", "tempGuid": "ha-{{ now().timestamp() | int }}", "method": "apple-script"}'
  pushover:
    url: !secret pushover_url
    method: POST
    content_type: "application/x-www-form-urlencoded"
    payload: "message={{ message }}"
    timeout: 20
