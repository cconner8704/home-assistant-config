- alias: Reboot Apple TV config if unavailable
  description: ''
  trigger:
  - platform: state
    entity_id:
    - media_player.master_bedroom2_apple_tv_apple_tv
    to: unavailable
  condition: []
  action:
  - action: homeassistant.reload_config_entry
    target:
      entity_id:
      - media_player.master_bedroom2_apple_tv_apple_tv
  mode: single

- alias: Daily Watchman Report
  id: daily_watchman_pushover
  description: Runs Watchman report at 5am and sends missing entity count via Pushover
  trigger:
  - platform: time
    at: "05:00:00"
  action:
  - action: watchman.report
  - delay:
      seconds: 10
  - action: rest_command.pushover
    data:
      message: "Missing entities: {{ states('sensor.watchman_missing_entities') }}&title=Watchman Report&priority=-1"
  mode: single

- alias: Coffee Morning Lights
  id: coffee_morning_lights
  description: When the Nespresso starts brewing between 8am-8pm ET, turn on the morning lights and office fan.
  trigger:
  - platform: numeric_state
    entity_id: sensor.nespresso_electric_consumption_w
    above: 10
    for:
      seconds: 3
  condition:
  - condition: time
    after: "08:00:00"
    before: "20:00:00"
  action:
  - service: switch.turn_on
    target:
      entity_id:
      - switch.dining_room_can_light
      - switch.dining_room_light
      - switch.entry_light_2
      - switch.kitchen_can_light
      - switch.kitchen_bar_light
      - switch.kitchen_cabinet_light
  - service: light.turn_on
    target:
      entity_id:
      - light.office_can_light
  - service: fan.turn_on
    target:
      entity_id:
      - fan.office_fan_switch
  mode: single

- alias: Lightning Alert — Pool Safety
  id: lightning_pool_safety
  description: Alert when lightning is detected within 15 miles. Get out of the pool!
  trigger:
  - platform: numeric_state
    entity_id: sensor.home_lightning_distance
    below: 15
  condition:
  - condition: numeric_state
    entity_id: sensor.home_lightning_counter
    above: 0
  action:
  - action: rest_command.pushover
    data:
      message: "Lightning {{ states('sensor.home_lightning_distance') }} miles away. GET OUT OF THE POOL!&title=⚡ LIGHTNING ALERT&priority=1"
  mode: single

- alias: Lightning All Clear
  id: lightning_all_clear
  description: Notify when no lightning has been detected for 30 minutes
  trigger:
  - platform: state
    entity_id: sensor.home_lightning_distance
    to: "unknown"
    for:
      minutes: 30
  condition: []
  action:
  - action: rest_command.pushover
    data:
      message: "No strikes for 30 minutes. Pool is safe.&title=Lightning All Clear&priority=-1"
  mode: single

- alias: NWS Severe Weather Alert
  id: nws_severe_weather
  description: Push notification for any NWS severe weather alert
  trigger:
  - platform: state
    entity_id: weather.klex
    attribute: alerts
  condition:
  - condition: template
    value_template: "{{ state_attr('weather.klex', 'alerts') | length > 0 }}"
  action:
  - action: rest_command.pushover
    data:
      message: "NWS severe weather alert for your area. Check HA for details.&title=⚠️ SEVERE WEATHER&priority=1"
  mode: single
